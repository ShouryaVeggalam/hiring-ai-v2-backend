# Render Blueprint — Celestra Hiring AI backend
# Deploy: dashboard.render.com → New → Blueprint → select this repo.

databases:
  - name: celestra-db
    plan: free
    databaseName: celestra_hiring
    user: celestra

services:
  - type: web
    name: celestra-hiring-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:create_app --factory --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: RENDER
        value: "true"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: AUTO_CREATE_TABLES
        value: "true"
      - key: LLM_OFFLINE_MODE
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: celestra-db
          property: connectionString
      # Allow Vercel frontend + local dev. Add preview URLs if needed.
      - key: BACKEND_CORS_ORIGINS
        value: "https://hiring-ai-v2-frontend.vercel.app,https://hiring-ai-v2-frontend-shouryaveggalams-projects.vercel.app,http://localhost:5173,http://localhost:3000"
      - key: FIRST_SUPERUSER_EMAIL
        value: admin@celestra.ai
      - key: FIRST_SUPERUSER_PASSWORD
        generateValue: true
      - key: FIRST_SUPERUSER_NAME
        value: Celestra Admin

# Redis removed from free blueprint — not needed for the web API on free tier.
# Celery workers are not available on Render free tier anyway.
